[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app. npm stays hand-rolled because the
# built-in dist installer fetches binaries; Homebrew consumes the hosted
# prebuilt archives.
installers = ["shell", "powershell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Generate per-artifact SHA-256 files and the unified sha256.sum manifest.
checksum = "sha256"
# Attest every release artifact in the platform build jobs.
github-attestations = true
# Let dist select the native/cross compiler for each target. Embedded
# cargo-auditable metadata is outside G1 and remains disabled.
cargo-auditable = false
# The built-in dist 0.32 npm installer fetches release binaries at install time,
# so G2 deliberately packages shipped binaries in the custom job instead.
# Both custom jobs consume the completed platform archives and block hosting.
global-artifacts-jobs = ["./verify-static-linux", "./package-npm"]
# Publish only after GitHub hosting succeeds. One custom workflow sequences
# crates.io, npm, and Homebrew so a failed prerequisite cannot produce another
# parallel partial release.
publish-jobs = ["./publish-all"]
# The ordered publisher checks out this repository, uses OIDC for both package
# registries, and passes only the permissions its nested workflows can consume.
github-custom-job-permissions = { "publish-all" = { contents = "read", id-token = "write", packages = "write" } }
# The ordered custom publisher writes dist's generated formula to this tap.
tap = "jiayanzeng/homebrew-tap"
# The Cargo package is architecture-named `vibescan-cli`, but users invoke the
# binary as `vibescan`; keep the Homebrew formula aligned with the binary.
formula = "vibescan"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
