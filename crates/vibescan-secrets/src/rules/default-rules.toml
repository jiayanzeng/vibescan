# Embedded default detection corpus for vibescan v1.
#
# Generic provider rules are an attributed compatibility subset adapted from
# the Gitleaks default ruleset conventions (MIT license):
# https://github.com/gitleaks/gitleaks
#
# Supabase-shaped rules are project-owned additions and are deliberately handed
# off as PossibleSupabaseKey for semantic classification in vibescan-supabase.

[[allowlists]]
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)vendor/''',
  '''(^|/)package-lock\.json$''',
  '''(^|/)pnpm-lock\.yaml$''',
  '''(^|/)yarn\.lock$''',
  '''(^|/)Cargo\.lock$''',
  '''(^|/).*\.env\.(example|sample)$''',
  '''(^|/).*\.example$''',
  '''(^|/).*\.sample$''',
]
stopwords = [
  "example",
  "placeholder",
  "changeme",
  "your_key_here",
  "test_key",
]

[[rules]]
id = "supabase-publishable-key"
kind = "possible_supabase_key"
regex = '''(sb_publishable_[A-Za-z0-9_-]{24,})'''
keywords = ["sb_publishable", "supabase"]

[[rules]]
id = "supabase-secret-key"
kind = "possible_supabase_key"
regex = '''(sb_secret_[A-Za-z0-9_-]{24,})'''
keywords = ["sb_secret", "supabase"]

[[rules]]
id = "supabase-legacy-jwt"
kind = "possible_supabase_key"
regex = '''(eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,})'''
keywords = ["supabase", "anon", "service_role", "eyj"]
entropy = 3.0

[[rules]]
id = "openai-api-key"
kind = "provider_secret"
regex = '''(sk-(?:proj-|svcacct-)?[A-Za-z0-9_-]{32,})'''
keywords = ["openai", "sk-", "api_key", "apikey"]
entropy = 3.0

[[rules]]
id = "anthropic-api-key"
kind = "provider_secret"
regex = '''(sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{32,})'''
keywords = ["anthropic", "sk-ant", "api_key", "apikey"]
entropy = 3.0

[[rules]]
id = "stripe-secret-key"
kind = "provider_secret"
regex = '''(sk_(?:live|test)_[A-Za-z0-9]{24,})'''
keywords = ["stripe", "sk_live", "sk_test"]
entropy = 3.0

[[rules]]
id = "github-token"
kind = "provider_secret"
regex = '''((?:ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36,})'''
keywords = ["github", "ghp_", "gho_", "ghu_", "ghs_", "ghr_"]
entropy = 3.0

[[rules]]
id = "aws-access-key-id"
kind = "provider_secret"
regex = '''((?:AKIA|ASIA)[A-Z0-9]{16})'''
keywords = ["aws", "akia", "asia", "access_key"]

[[rules]]
id = "private-key-block"
kind = "private_key"
regex = '''(-----BEGIN (?:RSA |EC |OPENSSH |DSA |PRIVATE )?PRIVATE KEY-----)'''
keywords = ["begin", "private key"]

[[rules]]
id = "generic-high-entropy-assignment"
kind = "generic_high_entropy"
regex = '''(?i)(?:secret|token|api[_-]?key|apikey|password|passwd|credential)\s*[:=]\s*['"]([A-Za-z0-9_./+=-]{24,})['"]'''
keywords = ["secret", "token", "api_key", "apikey", "password", "passwd", "credential"]
entropy = 3.5

[[rules.allowlists]]
stopwords = [
  "sb_publishable_",
  "sb_secret_",
]
