# CLA Assistant — gates pull requests until the contributor signs the CLA.
# Place this file at: .github/workflows/cla.yml
#
# How it works:
#   - When a PR is opened, the bot checks whether every commit author has signed.
#   - If not, it posts a comment asking them to sign, and sets a failing status.
#   - The contributor signs by posting the exact phrase in a PR comment (below).
#   - Signatures are recorded as JSON in the branch named under `branch:`.
#
# One-time setup is described in vibescan-relicensing-guide.md (Step 4). In short:
#   1. Create an empty branch to hold signatures (default here: `cla-signatures`).
#   2. Create a Personal Access Token with `repo` scope and save it as the repo
#      secret `CLA_SIGNATURES_TOKEN` (needed so the bot can commit signatures).
#   3. Merge this workflow. The bot activates on the next PR.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Explicit least-privilege permissions for the GITHUB_TOKEN.
permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Run when a PR event fires, or when someone posts the sign / recheck phrase.
        if: >
          (github.event.comment.body == 'recheck'
            || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
          || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # Provided automatically by GitHub Actions.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `repo` scope; lets the bot commit signatures to the branch below.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_SIGNATURES_TOKEN }}
        with:
          # Where signatures are stored (JSON), on the branch named below.
          path-to-signatures: 'signatures/cla-signatures.json'
          branch: 'cla-signatures'

          # The CLA contributors must read before signing.
          path-to-document: 'https://github.com/jiayanzeng/vibescan/blob/main/vibescan-cla-individual.md'

          # Accounts that never need to sign (the owner, and bots).
          allowlist: 'jiayanzeng,dependabot[bot]'

          # The exact phrase a contributor posts to sign.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'

          # Messages the bot posts.
          custom-notsigned-prcomment: >
            Thank you for your contribution! Before this pull request can be merged,
            please read the project
            [Contributor License Agreement](https://github.com/jiayanzeng/vibescan/blob/main/vibescan-cla-individual.md)
            and sign it by posting the following comment, exactly:
          custom-allsigned-prcomment: >
            All contributors have signed the CLA. Thank you!
