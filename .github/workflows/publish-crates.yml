name: Publish crates in dependency order

on:
  workflow_call:
    inputs:
      plan:
        description: The dist release plan supplied by the generated workflow.
        required: true
        type: string
    secrets:
      CARGO_REGISTRY_TOKEN:
        description: Optional first-release token; remove after trusted publishing is configured.
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish crates.io workspace
    runs-on: ubuntu-24.04
    env:
      BOOTSTRAP_CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Authenticate with crates.io trusted publishing
        if: ${{ env.BOOTSTRAP_CARGO_REGISTRY_TOKEN == '' }}
        id: crates-auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish bottom-up
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.BOOTSTRAP_CARGO_REGISTRY_TOKEN || steps.crates-auth.outputs.token }}
        run: bash scripts/publish-crates.sh --publish
